version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: real_estate
    ports:
      - "3306:3306"
    volumes:
      - ./data/raw:/docker-entrypoint-initdb.d:ro
      - mysql_data:/var/lib/mysql

  nlp:
    build: .
    volumes:
      - .:/app
    working_dir: /app
    command: ["python", "-m", "pytest", "tests/test_week5.py", "-v"]

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    working_dir: /app
    command: ["uvicorn", "scripts.api_app:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      - mysql

  streamlit:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    working_dir: /app
    command: ["streamlit", "run", "scripts/streamlit_app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000

volumes:
  mysql_data:

