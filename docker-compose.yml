version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: real_estate
    ports:
      - "3306:3306"
    volumes:
      - ./data/raw:/docker-entrypoint-initdb.d:ro
      - mysql_data:/var/lib/mysql

  nlp:
    build: .
    volumes:
      - .:/app
    working_dir: /app
    command: ["python", "-m", "pytest", "tests/test_week5.py", "-v"]

volumes:
  mysql_data:
